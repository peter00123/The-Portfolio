<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgLS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e1a"/>
      <stop offset="100%" style="stop-color:#080812"/>
    </linearGradient>
    <radialGradient id="qrGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c8b89a;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#c8b89a;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161624"/>
      <stop offset="100%" style="stop-color:#101018"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgLS)"/>

  <!-- Terminal window (left) -->
  <rect x="50" y="80" width="380" height="440" rx="10" fill="url(#termGrad)" stroke="#c8b89a" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Title bar -->
  <rect x="50" y="80" width="380" height="36" rx="10" fill="#1e1e2e"/>
  <rect x="50" y="104" width="380" height="12" fill="#1e1e2e"/>
  <circle cx="76" cy="98" r="6" fill="#c8b89a" fill-opacity="0.2"/>
  <circle cx="96" cy="98" r="6" fill="#c8b89a" fill-opacity="0.13"/>
  <circle cx="116" cy="98" r="6" fill="#c8b89a" fill-opacity="0.1"/>
  <text x="240" y="102" fill="#c8b89a" font-size="9" font-family="monospace" text-anchor="middle" opacity="0.4">easy-live-share — python</text>

  <!-- Terminal content -->
  <text x="72" y="140" fill="#6fcf97" font-size="10" font-family="monospace">$ python liveshare.py</text>
  <text x="72" y="162" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.6">  ___              _    _           </text>
  <text x="72" y="176" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.6"> | __|__ _ ____  _| |  (_)__ ___    </text>
  <text x="72" y="190" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.6"> | _|/ _` (_-&lt; || | |__| \ V / -_) </text>
  <text x="72" y="204" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.6"> |___\__,_/__/\_, |____|_|\_/\___| </text>
  <text x="72" y="218" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.4">              |__/                 </text>

  <text x="72" y="242" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.5">────────────────────────────────</text>
  <text x="72" y="262" fill="#e8d5b7" font-size="10" font-family="monospace" opacity="0.75">Scanning for images in ./designs/</text>
  <text x="72" y="280" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.5">  Found: logo_v3.png</text>
  <text x="72" y="296" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.5">  Found: banner_final.jpg</text>
  <text x="72" y="312" fill="#c8b89a" font-size="10" font-family="monospace" opacity="0.5">  Found: mockup_screen.svg</text>
  <text x="72" y="336" fill="#6fcf97" font-size="10" font-family="monospace">Starting local server...</text>
  <text x="72" y="354" fill="#6fcf97" font-size="10" font-family="monospace">Server running at:</text>
  <text x="72" y="372" fill="#f5a623" font-size="10" font-family="monospace">  http://192.168.1.42:8080</text>
  <text x="72" y="396" fill="#e8d5b7" font-size="10" font-family="monospace" opacity="0.8">Generating QR code...</text>
  <text x="72" y="414" fill="#6fcf97" font-size="10" font-family="monospace">✓ QR code ready! Scan to preview.</text>
  <!-- blinking cursor -->
  <rect x="72" y="432" width="8" height="14" fill="#c8b89a" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- QR Code panel (right) -->
  <rect x="460" y="80" width="290" height="440" rx="10" fill="#14141e" stroke="#c8b89a" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="605" y="116" fill="#e8d5b7" font-size="11" font-family="sans-serif" text-anchor="middle" opacity="0.7" letter-spacing="1">SCAN TO PREVIEW</text>

  <!-- QR glow -->
  <ellipse cx="605" cy="270" rx="100" ry="100" fill="url(#qrGlow)"/>

  <!-- QR Code (geometric representation) -->
  <rect x="525" y="136" width="160" height="160" rx="4" fill="#0c0c16" stroke="#c8b89a" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Corner squares -->
  <rect x="533" y="144" width="36" height="36" rx="3" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="539" y="150" width="24" height="24" rx="1" fill="#c8b89a" fill-opacity="0.6"/>
  <rect x="641" y="144" width="36" height="36" rx="3" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="647" y="150" width="24" height="24" rx="1" fill="#c8b89a" fill-opacity="0.6"/>
  <rect x="533" y="252" width="36" height="36" rx="3" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="539" y="258" width="24" height="24" rx="1" fill="#c8b89a" fill-opacity="0.6"/>
  <!-- QR data dots (random pattern) -->
  <g fill="#c8b89a" fill-opacity="0.55">
    <rect x="583" y="144" width="6" height="6"/>
    <rect x="593" y="144" width="6" height="6"/>
    <rect x="613" y="144" width="6" height="6"/>
    <rect x="623" y="144" width="6" height="6"/>
    <rect x="583" y="154" width="6" height="6"/>
    <rect x="603" y="154" width="6" height="6"/>
    <rect x="623" y="154" width="6" height="6"/>
    <rect x="593" y="164" width="6" height="6"/>
    <rect x="613" y="164" width="6" height="6"/>
    <rect x="583" y="174" width="6" height="6"/>
    <rect x="603" y="174" width="6" height="6"/>
    <rect x="623" y="174" width="6" height="6"/>
    <rect x="593" y="184" width="6" height="6"/>
    <rect x="613" y="184" width="6" height="6"/>
    <rect x="583" y="194" width="6" height="6"/>
    <rect x="583" y="204" width="6" height="6"/>
    <rect x="593" y="204" width="6" height="6"/>
    <rect x="613" y="204" width="6" height="6"/>
    <rect x="623" y="204" width="6" height="6"/>
    <rect x="583" y="214" width="6" height="6"/>
    <rect x="603" y="214" width="6" height="6"/>
    <rect x="593" y="224" width="6" height="6"/>
    <rect x="613" y="224" width="6" height="6"/>
    <rect x="623" y="224" width="6" height="6"/>
    <rect x="603" y="252" width="6" height="6"/>
    <rect x="613" y="252" width="6" height="6"/>
    <rect x="623" y="252" width="6" height="6"/>
    <rect x="603" y="262" width="6" height="6"/>
    <rect x="623" y="262" width="6" height="6"/>
    <rect x="613" y="272" width="6" height="6"/>
    <rect x="623" y="272" width="6" height="6"/>
    <rect x="603" y="282" width="6" height="6"/>
  </g>

  <!-- URL display -->
  <rect x="525" y="312" width="160" height="24" rx="4" fill="#0c0c16" stroke="#c8b89a" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="605" y="328" fill="#f5a623" font-size="9" font-family="monospace" text-anchor="middle">192.168.1.42:8080</text>

  <!-- Network diagram -->
  <text x="605" y="366" fill="#c8b89a" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.4" letter-spacing="1">SAME NETWORK</text>
  <!-- Laptop -->
  <rect x="548" y="380" width="50" height="32" rx="3" fill="#1e1e2e" stroke="#c8b89a" stroke-width="0.7" stroke-opacity="0.4"/>
  <text x="573" y="400" fill="#c8b89a" font-size="10" text-anchor="middle" opacity="0.6">💻</text>
  <rect x="540" y="412" width="66" height="4" rx="2" fill="#1e1e2e" stroke="#c8b89a" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Phone -->
  <rect x="636" y="376" width="28" height="44" rx="4" fill="#1e1e2e" stroke="#c8b89a" stroke-width="0.7" stroke-opacity="0.4"/>
  <text x="650" y="402" fill="#c8b89a" font-size="10" text-anchor="middle" opacity="0.6">📱</text>
  <!-- Dashed connection -->
  <line x1="606" y1="396" x2="636" y2="396" stroke="#c8b89a" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 3"/>
  <circle cx="620" cy="396" r="3" fill="#6fcf97" opacity="0.6"/>

  <text x="605" y="446" fill="#e8d5b7" font-size="10" font-family="sans-serif" text-anchor="middle" opacity="0.5">Instant preview on any device</text>
  <text x="605" y="462" fill="#c8b89a" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.3">No cables. No uploads. Just scan.</text>
</svg>
