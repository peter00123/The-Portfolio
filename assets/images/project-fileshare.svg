<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgFS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e1a"/>
      <stop offset="100%" style="stop-color:#080810"/>
    </linearGradient>
    <linearGradient id="phoneFS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#12121e"/>
    </linearGradient>
    <linearGradient id="progressBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8b89a"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <radialGradient id="wifiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c8b89a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c8b89a;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgFS)"/>

  <!-- WIP Banner -->
  <rect x="0" y="0" width="800" height="32" fill="#c8b89a" fill-opacity="0.08"/>
  <text x="400" y="21" fill="#c8b89a" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.6" letter-spacing="3">⚡  WORK IN PROGRESS  ·  ACTIVE DEVELOPMENT  ·  COMING SOON  ⚡</text>

  <!-- Cloud + WiFi central illustration -->
  <ellipse cx="400" cy="200" rx="140" ry="100" fill="url(#wifiGlow)"/>
  <!-- WiFi arcs -->
  <path d="M340,200 Q400,140 460,200" fill="none" stroke="#c8b89a" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M314,222 Q400,120 486,222" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <path d="M288,245 Q400,98 512,245" fill="none" stroke="#c8b89a" stroke-width="1" stroke-opacity="0.15" stroke-linecap="round"/>
  <circle cx="400" cy="210" r="8" fill="#c8b89a" opacity="0.7"/>

  <!-- Cloud icon -->
  <g transform="translate(360, 130)">
    <ellipse cx="40" cy="30" rx="32" ry="22" fill="#c8b89a" fill-opacity="0.1" stroke="#c8b89a" stroke-width="1.2" stroke-opacity="0.4"/>
    <ellipse cx="20" cy="36" rx="16" ry="14" fill="#c8b89a" fill-opacity="0.1" stroke="#c8b89a" stroke-width="1.2" stroke-opacity="0.4"/>
    <ellipse cx="60" cy="36" rx="16" ry="14" fill="#c8b89a" fill-opacity="0.1" stroke="#c8b89a" stroke-width="1.2" stroke-opacity="0.4"/>
    <rect x="10" y="36" width="60" height="18" fill="#c8b89a" fill-opacity="0.08"/>
    <!-- Upload arrow -->
    <line x1="40" y1="60" x2="40" y2="28" stroke="#c8b89a" stroke-width="2" stroke-opacity="0.6"/>
    <polygon points="33,34 40,22 47,34" fill="#c8b89a" opacity="0.6"/>
  </g>

  <!-- Left phone (sender) -->
  <rect x="90" y="100" width="185" height="400" rx="24" fill="url(#phoneFS)" stroke="#c8b89a" stroke-width="0.8" stroke-opacity="0.2"/>
  <rect x="100" y="116" width="165" height="368" rx="16" fill="#0e0e18"/>
  <!-- Notch -->
  <rect x="143" y="116" width="79" height="16" rx="0" fill="url(#phoneFS)"/>
  <rect x="158" y="119" width="50" height="9" rx="4.5" fill="#080810"/>
  <!-- Status -->
  <text x="116" y="140" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4">9:41</text>
  <!-- App header -->
  <rect x="100" y="130" width="165" height="40" fill="#181828"/>
  <text x="182" y="150" fill="#e8d5b7" font-size="10" font-family="sans-serif" text-anchor="middle" opacity="0.9" font-weight="500">ShareDrop</text>
  <text x="182" y="163" fill="#c8b89a" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.4">Select files to send</text>
  <!-- File list -->
  <text x="116" y="188" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4" letter-spacing="1">MY FILES</text>
  <!-- file item 1 -->
  <rect x="108" y="196" width="149" height="36" rx="6" fill="#181828" stroke="#c8b89a" stroke-width="0.3" stroke-opacity="0.2"/>
  <rect x="116" y="204" width="24" height="20" rx="3" fill="#c8b89a" fill-opacity="0.15"/>
  <text x="128" y="218" fill="#c8b89a" font-size="8" text-anchor="middle" opacity="0.6">📄</text>
  <text x="148" y="210" fill="#e8d5b7" font-size="8" font-family="sans-serif" opacity="0.8">report_final.pdf</text>
  <text x="148" y="222" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4">2.4 MB</text>
  <rect x="240" y="204" width="12" height="12" rx="2" fill="#c8b89a" fill-opacity="0.2"/>
  <text x="246" y="214" fill="#c8b89a" font-size="7" text-anchor="middle">✓</text>
  <!-- file item 2 -->
  <rect x="108" y="238" width="149" height="36" rx="6" fill="#181828" stroke="#c8b89a" stroke-width="0.3" stroke-opacity="0.2"/>
  <rect x="116" y="246" width="24" height="20" rx="3" fill="#f5a623" fill-opacity="0.12"/>
  <text x="128" y="260" fill="#f5a623" font-size="8" text-anchor="middle" opacity="0.8">🖼</text>
  <text x="148" y="252" fill="#e8d5b7" font-size="8" font-family="sans-serif" opacity="0.8">design_v4.png</text>
  <text x="148" y="264" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4">4.1 MB</text>
  <rect x="240" y="246" width="12" height="12" rx="2" fill="#c8b89a" fill-opacity="0.2"/>
  <text x="246" y="256" fill="#c8b89a" font-size="7" text-anchor="middle">✓</text>
  <!-- file item 3 -->
  <rect x="108" y="280" width="149" height="36" rx="6" fill="#181828" stroke="#c8b89a" stroke-width="0.3" stroke-opacity="0.2"/>
  <rect x="116" y="288" width="24" height="20" rx="3" fill="#6fcf97" fill-opacity="0.12"/>
  <text x="128" y="302" fill="#6fcf97" font-size="8" text-anchor="middle" opacity="0.8">📦</text>
  <text x="148" y="294" fill="#e8d5b7" font-size="8" font-family="sans-serif" opacity="0.8">project.zip</text>
  <text x="148" y="306" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4">18.7 MB</text>
  <!-- Send button -->
  <rect x="108" y="336" width="149" height="36" rx="8" fill="url(#progressBar)"/>
  <text x="182" y="358" fill="#0e0e18" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="600">Send Files →</text>
  <!-- Transfer in progress -->
  <text x="116" y="392" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4" letter-spacing="1">TRANSFERRING</text>
  <rect x="108" y="398" width="149" height="6" rx="3" fill="#c8b89a" fill-opacity="0.08"/>
  <rect x="108" y="398" width="95" height="6" rx="3" fill="url(#progressBar)" opacity="0.8"/>
  <text x="182" y="420" fill="#c8b89a" font-size="8" font-family="sans-serif" text-anchor="middle" opacity="0.5">64% · 1.8 MB/s</text>
  <!-- Bottom nav -->
  <rect x="100" y="456" width="165" height="28" rx="0" fill="#181828"/>
  <rect x="100" y="456" width="165" height="1" fill="#c8b89a" fill-opacity="0.1"/>
  <text x="138" y="474" fill="#c8b89a" font-size="11" text-anchor="middle" opacity="0.7">⌂</text>
  <text x="182" y="474" fill="#c8b89a" font-size="11" text-anchor="middle" opacity="0.35">↑↓</text>
  <text x="227" y="474" fill="#c8b89a" font-size="11" text-anchor="middle" opacity="0.35">🕐</text>

  <!-- Transfer beam in center -->
  <g opacity="0.5">
    <line x1="285" y1="320" x2="515" y2="320" stroke="url(#progressBar)" stroke-width="2" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <polygon points="510,314 522,320 510,326" fill="#f5a623" opacity="0.8"/>
    <!-- Cloud badge -->
    <rect x="348" y="300" width="104" height="28" rx="6" fill="#0e0e18" stroke="#c8b89a" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="400" y="319" fill="#c8b89a" font-size="8" font-family="sans-serif" text-anchor="middle" opacity="0.6">☁ Firebase / Supabase</text>
  </g>

  <!-- Right phone (receiver) -->
  <rect x="525" y="100" width="185" height="400" rx="24" fill="url(#phoneFS)" stroke="#c8b89a" stroke-width="0.8" stroke-opacity="0.2"/>
  <rect x="535" y="116" width="165" height="368" rx="16" fill="#0e0e18"/>
  <rect x="578" y="116" width="79" height="16" rx="0" fill="url(#phoneFS)"/>
  <rect x="593" y="119" width="50" height="9" rx="4.5" fill="#080810"/>
  <text x="551" y="140" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4">9:41</text>
  <rect x="535" y="130" width="165" height="40" fill="#181828"/>
  <text x="617" y="150" fill="#e8d5b7" font-size="10" font-family="sans-serif" text-anchor="middle" opacity="0.9" font-weight="500">ShareDrop</text>
  <text x="617" y="163" fill="#c8b89a" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.4">Receiving files...</text>
  <!-- Incoming notification -->
  <rect x="543" y="180" width="149" height="44" rx="8" fill="#1a2a1a" stroke="#6fcf97" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="617" y="199" fill="#6fcf97" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.9">📥 Incoming Transfer</text>
  <text x="617" y="213" fill="#c8b89a" font-size="8" font-family="sans-serif" text-anchor="middle" opacity="0.5">From: Basil's Phone</text>
  <!-- Received files -->
  <text x="551" y="248" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4" letter-spacing="1">RECEIVED</text>
  <rect x="543" y="256" width="149" height="32" rx="6" fill="#181828" stroke="#6fcf97" stroke-width="0.3" stroke-opacity="0.4"/>
  <text x="559" y="270" fill="#e8d5b7" font-size="8" font-family="sans-serif" opacity="0.8">📄 report_final.pdf</text>
  <text x="680" y="270" fill="#6fcf97" font-size="8" font-family="sans-serif" text-anchor="end">✓</text>
  <text x="559" y="282" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4">2.4 MB · Complete</text>
  <rect x="543" y="295" width="149" height="32" rx="6" fill="#181828" stroke="#f5a623" stroke-width="0.3" stroke-opacity="0.4"/>
  <text x="559" y="309" fill="#e8d5b7" font-size="8" font-family="sans-serif" opacity="0.8">🖼 design_v4.png</text>
  <text x="559" y="321" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.4">4.1 MB · In progress…</text>
  <!-- progress mini -->
  <rect x="543" y="334" width="149" height="4" rx="2" fill="#c8b89a" fill-opacity="0.08"/>
  <rect x="543" y="334" width="95" height="4" rx="2" fill="url(#progressBar)" opacity="0.7"/>
  <rect x="543" y="348" width="149" height="32" rx="6" fill="#181828" stroke="#c8b89a" stroke-width="0.3" stroke-opacity="0.2"/>
  <text x="559" y="362" fill="#e8d5b7" font-size="8" font-family="sans-serif" opacity="0.5">📦 project.zip</text>
  <text x="559" y="374" fill="#c8b89a" font-size="7" font-family="sans-serif" opacity="0.3">18.7 MB · Queued</text>
  <!-- Bottom nav receiver -->
  <rect x="535" y="456" width="165" height="28" rx="0" fill="#181828"/>
  <rect x="535" y="456" width="165" height="1" fill="#c8b89a" fill-opacity="0.1"/>
  <text x="573" y="474" fill="#c8b89a" font-size="11" text-anchor="middle" opacity="0.7">⌂</text>
  <text x="617" y="474" fill="#c8b89a" font-size="11" text-anchor="middle" opacity="0.35">↓</text>
  <text x="662" y="474" fill="#c8b89a" font-size="11" text-anchor="middle" opacity="0.35">🕐</text>

  <!-- Bottom text -->
  <text x="400" y="545" fill="#e8d5b7" font-size="12" font-family="Georgia, serif" text-anchor="middle" opacity="0.6">Local network &amp; internet file transfers</text>
  <text x="400" y="565" fill="#c8b89a" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.3" letter-spacing="2">KOTLIN · ANDROID · FIREBASE · SUPABASE</text>
</svg>
