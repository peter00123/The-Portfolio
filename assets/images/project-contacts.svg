  <text x="285" y="262" fill="#6fcf97" font-size="9" font-family="monospace">def</text>
  <text x="307" y="262" fill="#f5a623" font-size="9" font-family="monospace"> bulk_import</text>
  <text x="377" y="262" fill="#e8d5b7" font-size="9" font-family="monospace" opacity="0.75">(file):</text>
  <text x="297" y="276" fill="#e8d5b7" font-size="9" font-family="monospace" opacity="0.6">df = pd.read_excel(file)</text>
  <text x="297" y="290" fill="#e8d5b7" font-size="9" font-family="monospace" opacity="0.6">service = build_service()</text>
  <text x="297" y="304" fill="#8be9fd" font-size="9" font-family="monospace">for</text>
  <text x="316" y="304" fill="#e8d5b7" font-size="9" font-family="monospace" opacity="0.6"> _, row in df.iterrows():</text>
  <text x="306" y="318" fill="#e8d5b7" font-size="9" font-family="monospace" opacity="0.6">  create_contact(service,</text>
  <text x="306" y="332" fill="#e8d5b7" font-size="9" font-family="monospace" opacity="0.6">    row.name, row.phone)</text>
  <text x="285" y="352" fill="#6fcf97" font-size="9" font-family="monospace">print</text>
  <text x="310" y="352" fill="#e8d5b7" font-size="9" font-family="monospace" opacity="0.55">(f"✓ {len(df)} contacts added")</text>

